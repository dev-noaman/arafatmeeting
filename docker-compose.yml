services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mini-meeting-backend-dev
    ports:
      - "3002:3000"
    volumes:
      - ./backend:/app
      - /app/tmp
      - summarizer-tmp:/data/summarizer
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - ENV=development
      - FRONTEND_URL=http://localhost:5173
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mini_meeting?sslmode=disable
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=mini_meeting
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USERNAME=default
      - REDIS_PASSWORD=
      - SUMMARIZER_CHUNK_DURATION_SECONDS=20
      - SUMMARIZER_TEMP_DIR=/data/summarizer
      - SUMMARIZER_CLEANUP_AFTER_HOURS=24
      - WHISPER_URL=http://whisper:8000
      - WHISPER_MODEL=tiny
      - WHISPER_TIMEOUT=300s
      - WHISPER_MAX_CONCURRENCY=2
      - OPEN_ROUTER_BASE_URL=https://openrouter.ai/api/v1
      - OPEN_ROUTER_MODEL=meta-llama/llama-3.2-3b-instruct:free
      - OPEN_ROUTER_TIMEOUT=300s
      - OPEN_ROUTER_MAX_TOKENS=4096
      - LIVEKIT_API_KEY=dev_api_key
      - LIVEKIT_API_SECRET=dev_api_secret
      - LIVEKIT_URL=ws://livekit:7880
      # Brevo Email Configuration
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - BREVO_SENDER_EMAIL=${BREVO_SENDER_EMAIL:-noreply@mini-meeting.app}
      - BREVO_SENDER_NAME=${BREVO_SENDER_NAME:-Mini Meeting}
      # JWT Configuration
      - JWT_SECRET=mini-meeting-dev-jwt-secret-2024-docker
      - JWT_EXPIRATION=24h
      # OAuth Configuration (optional - set in .env)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URL=http://localhost:3002/api/v1/auth/google/callback
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URL=http://localhost:3002/api/v1/auth/github/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      whisper:
        condition: service_started
      livekit:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mini-meeting-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_BASE_URL=http://localhost:3002/api/v1
      - VITE_LIVEKIT_URL=ws://localhost:7880
    depends_on:
      - backend

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: mini-meeting-whisper-dev
    ports:
      - "9000:8000"
    environment:
      - WHISPER__MODEL=tiny
      - WHISPER__INFERENCE_DEVICE=cpu
      - WHISPER__COMPUTE_TYPE=int8
    volumes:
      - whisper-models:/root/.cache/huggingface

  livekit:
    image: livekit/livekit-server:latest
    container_name: mini-meeting-livekit-dev
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit-config.yaml:/etc/livekit/livekit-config.yaml:ro

  postgres:
    image: postgres:16-alpine
    container_name: mini-meeting-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mini_meeting
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_meeting"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mini-meeting-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --requirepass ""
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  summarizer-tmp:
  whisper-models:
